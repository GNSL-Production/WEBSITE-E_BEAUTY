<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
    <meta name="theme-color" content="#D4AF37">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">

    <title>Page introuvable | E Beauty Esthetics</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .not-found {
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6rem 1.5rem;
            background: linear-gradient(180deg, var(--ivory) 0%, var(--surface) 100%);
        }

        .not-found-content {
            max-width: 34rem;
        }

        .not-found-code {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 14vw, 7rem);
            color: var(--gold);
            line-height: 1;
            margin-bottom: 1rem;
        }

        .not-found-actions {
            margin-top: 2rem;
        }
    </style>
</head>

<body>
    <main class="not-found">
        <div class="not-found-content fade-in visible">
            <p class="not-found-code" aria-hidden="true">404</p>
            <h1 style="font-size: clamp(1.75rem, 4vw, 2.5rem);">Cette page n'existe pas</h1>
            <p class="description">Le lien suivi est peut-être erroné ou la page a été déplacée.</p>
            <div class="not-found-actions">
                <a href="/index.html" class="cta-button">Retour à l'accueil</a>
            </div>
        </div>
    </main>
</body>
</html>
